name: Refresh data

# Runs the full ETL against an ephemeral Postgres service container,
# exports static JSON to app/static/data/, and commits the refreshed
# JSON back to main. Production (Railway) only serves Flask + static
# files — no hosted Postgres required.

on:
  schedule:
    # 1st of each month at 07:00 UTC. TX Mixed Beverage releases monthly.
    - cron: '0 7 1 * *'
  workflow_dispatch:  # manual trigger from the Actions tab

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/austin_restaurants
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      TARGET_CITIES: AUSTIN

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: austin_restaurants
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize schemas
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d austin_restaurants -f sql/01_schemas.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d austin_restaurants -f sql/02_bronze.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d austin_restaurants -f sql/03_silver.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d austin_restaurants -f sql/04_gold.sql

      - name: Ingest Texas Mixed Beverage (Austin)
        run: python -m pipeline.bronze.mixed_beverage

      - name: Ingest Austin inspections
        run: python -m pipeline.bronze.austin_inspections

      - name: Rebuild silver layer
        run: |
          python -m pipeline.silver.clean_mixed_beverage
          python -m pipeline.silver.clean_inspections
          python -m pipeline.silver.match_establishments

      - name: Rebuild gold layer
        run: python -m pipeline.gold.aggregates

      - name: Export static JSON
        run: python -m pipeline.export.static_json

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/static/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Monthly data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
