name: Refresh data

# Refreshes the Railway Postgres against live sources:
#   - Texas Mixed Beverage receipts (filtered to Austin)
#   - Austin inspections (live Socrata feed)

on:
  schedule:
    # 1st of each month at 07:00 UTC. TX Mixed Beverage releases monthly.
    - cron: '0 7 1 * *'
  workflow_dispatch:  # manual trigger from the Actions tab

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      TARGET_CITIES: AUSTIN

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest Texas Mixed Beverage (Austin)
        run: python -m pipeline.bronze.mixed_beverage

      - name: Ingest Austin inspections
        run: python -m pipeline.bronze.austin_inspections

      - name: Rebuild silver layer
        run: |
          python -m pipeline.silver.clean_mixed_beverage
          python -m pipeline.silver.clean_inspections
          python -m pipeline.silver.match_establishments

      - name: Rebuild gold layer
        run: python -m pipeline.gold.aggregates

      - name: Report row counts
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text
          from pipeline.config import DATABASE_URL
          e = create_engine(DATABASE_URL)
          tables = [
              "bronze.mixed_beverage", "bronze.inspections",
              "silver.establishments",
              "gold.revenue_by_zip_month", "gold.score_revenue_correlation",
          ]
          with e.connect() as c:
              for t in tables:
                  n = c.execute(text(f"SELECT count(*) FROM {t}")).scalar_one()
                  print(f"{t:40s} {n:>10,}")
          PY
