[phases.setup]
nixPkgs = ["python311", "gcc", "nodejs_20"]

[phases.install]
cmds = [
  "pip install --no-cache-dir -r requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
# Vite outputs to ../app/static/dist which Flask serves at /app/*.
cmds = ["cd frontend && npm run build"]

[start]
cmd = "gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
